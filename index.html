<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuditorQuest — Simulador CESPE/CEBRASPE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        /* ----- VARIÁVEIS GLOBAIS (DARK é o padrão) ----- */
        :root {
            --bg-primary: #0B0B0C;
            --bg-secondary: #121214;
            --card-bg: #1A1A1D;
            --card-hover: #222226;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-primary: #F3F4F6;
            --text-secondary: #A1A1AA;
            --text-tertiary: #71717A;
            --accent-correct: #22C55E;
            --accent-error: #EF4444;
            --accent-orange: #F97316;
            --shadow-card: 0 6px 25px rgba(0, 0, 0, 0.45);
            --shadow-hover: 0 10px 35px rgba(0, 0, 0, 0.6);
            --transition: all 0.25s ease;
        }

        /* Tema Claro */
        [data-theme="light"] {
            --bg-primary: #F9FAFB;
            --bg-secondary: #FFFFFF;
            --card-bg: #FFFFFF;
            --card-hover: #F3F4F6;
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-light: rgba(0, 0, 0, 0.1);
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-tertiary: #6B7280;
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: var(--transition);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            scroll-behavior: smooth;
        }

        /* Cards e superfícies */
        .card {
            background: var(--card-bg);
            border-radius: 1.25rem;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
            transition: var(--transition);
        }
        .card:hover {
            background: var(--card-hover);
            border-color: var(--border-light);
            box-shadow: var(--shadow-hover);
        }

        /* Header com blur */
        .app-header {
            background: rgba(var(--bg-primary-rgb, 11, 11, 12), 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 30;
        }
        [data-theme="light"] .app-header {
            background: rgba(249, 250, 251, 0.92);
        }

        .btn-primary {
            background: var(--accent-orange);
            color: white;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.2s ease;
            border: none;
        }
        .btn-primary:hover {
            background: #EA580C;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(249,115,22,0.2);
        }

        /* Progress bar */
        .progress-top {
            position: sticky;
            top: 0;
            z-index: 31;
            height: 3px;
            background: var(--border-subtle);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-orange);
            transition: width 0.3s ease;
        }

        .gran-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ----- QUESTÃO CARD PREMIUM ----- */
        .question-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            margin-bottom: 1.5rem;
        }
        .question-card:hover {
            background: var(--card-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .question-card.correta {
            border-left: 4px solid var(--accent-correct);
        }
        .question-card.errada {
            border-left: 4px solid var(--accent-error);
        }

        .questao-numero {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .questao-texto {
            font-size: 1.125rem;
            line-height: 1.6;
            color: var(--text-primary);
            margin: 0.75rem 0 1rem 0;
            font-weight: 450;
        }

        /* Botões de resposta */
        .btn-resposta {
            flex: 1;
            padding: 0.75rem;
            border-radius: 14px;
            font-weight: 600;
            border: none;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }
        .btn-certo {
            background: rgba(34, 197, 94, 0.08);
            color: var(--accent-correct);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .btn-certo:hover {
            background: rgba(34, 197, 94, 0.18);
            transform: scale(1.02);
        }
        .btn-errado {
            background: rgba(239, 68, 68, 0.08);
            color: var(--accent-error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .btn-errado:hover {
            background: rgba(239, 68, 68, 0.18);
            transform: scale(1.02);
        }

        /* Comentário profissional */
        .btn-comentario {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0.5rem 0.75rem;
            border-radius: 40px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .btn-comentario:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }
        .comentario-content {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 16px;
            margin-top: 0.75rem;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            line-height: 1.55;
            font-size: 0.9rem;
            animation: fadeSlide 0.25s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Paginação */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 2rem;
        }
        .page-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }
        .page-btn:hover:not(:disabled) {
            background: var(--card-hover);
            color: var(--text-primary);
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Formulários */
        select, textarea, input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 0.65rem;
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-orange);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 200;
            animation: fadeOut 2s forwards;
            border: 1px solid var(--border-light);
            font-weight: 500;
        }

        /* Modo Foco */
        body.focus-mode .sidebar { display: none; }
        body.focus-mode .gran-layout { grid-template-columns: 1fr; }
        body.focus-mode .main-content { max-width: 780px; margin: 0 auto; }
        .exit-focus-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: none;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        body.focus-mode .exit-focus-btn { display: flex; align-items: center; gap: 0.5rem; }

        @media (max-width: 900px) {
            .gran-layout { grid-template-columns: 1fr; padding: 1rem; gap: 1.2rem; }
            .question-card { padding: 1.2rem; }
            .questao-texto { font-size: 1rem; }
            .flex.gap-3 { flex-direction: column; }
            .btn-resposta { width: 100%; }
        }
    </style>
</head>
<body>

<div class="progress-top"><div id="topProgressFill" class="progress-fill"></div></div>

<div class="app-header">
    <div class="flex items-center gap-3">
        <div class="bg-orange-500/20 rounded-xl p-2"><i class="fas fa-gavel text-orange-400 text-xl"></i></div>
        <div><h1 class="text-xl font-bold">Auditor<span class="text-orange-400">Quest</span></h1><p class="text-xs text-textSecondary">CESPE / CEBRASPE</p></div>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
        <button id="focusModeBtn" class="bg-white/5 hover:bg-white/10 text-current px-3 py-1.5 rounded-full text-sm font-medium flex items-center gap-2"><i class="fas fa-expand-alt"></i> Modo Foco</button>
        <button id="themeToggleBtn" class="bg-white/5 hover:bg-white/10 text-current px-3 py-1.5 rounded-full text-sm font-medium flex items-center gap-2"><i class="fas fa-moon"></i> Tema</button>
        <button id="resetProgressBtn" class="bg-white/5 hover:bg-white/10 text-current px-3 py-1.5 rounded-full text-sm font-medium flex items-center gap-2"><i class="fas fa-undo-alt"></i> Reset</button>
        <div class="relative">
            <button id="userMenuBtn" class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full"><i class="fas fa-user-circle"></i><span id="userNameDisplay" class="text-sm">Usuário</span><i class="fas fa-chevron-down text-xs"></i></button>
            <div id="userDropdown" class="absolute right-0 mt-2 w-48 bg-card rounded-xl shadow-lg hidden z-50 border border-borderLight">
                <button id="exportDataBtn" class="w-full text-left px-4 py-2 text-sm hover:bg-white/5 flex items-center gap-2"><i class="fas fa-download"></i> Exportar JSON</button>
                <button id="clearAllBtn" class="w-full text-left px-4 py-2 text-sm hover:bg-white/5 text-red-400 flex items-center gap-2"><i class="fas fa-trash-alt"></i> Limpar tudo</button>
            </div>
        </div>
    </div>
</div>

<div class="gran-layout">
    <div class="sidebar space-y-6">
        <div class="card p-5">
            <div class="flex items-center gap-2 mb-2"><i class="fas fa-hourglass-half text-orange-400"></i><h2 class="font-semibold">Cronômetro</h2></div>
            <div class="text-center"><div id="timerDisplay" class="text-2xl font-mono font-bold bg-black/30 inline-block px-4 py-1 rounded-xl">00:00:00</div>
            <div class="flex justify-center gap-2 mt-2"><button id="timerStart" class="bg-emerald-700/70 hover:bg-emerald-600 text-white px-3 py-1 rounded-lg text-xs"><i class="fas fa-play"></i> Iniciar</button><button id="timerPause" class="bg-yellow-600/70 hover:bg-yellow-500 px-3 py-1 rounded-lg text-xs"><i class="fas fa-pause"></i> Pausar</button><button id="timerStop" class="bg-red-600/70 hover:bg-red-500 px-3 py-1 rounded-lg text-xs"><i class="fas fa-stop"></i> Parar</button></div></div>
            <div class="flex flex-col gap-2 mt-4">
                <button id="downloadErrorsBtn" class="bg-rose-950/40 text-rose-300 border border-rose-800/40 font-medium py-2 rounded-xl flex items-center justify-center gap-2 text-sm hover:bg-rose-900/50"><i class="fas fa-book-open"></i> Caderno de erros</button>
                <button id="downloadNotebookBtn" class="bg-sky-950/40 text-sky-300 border border-sky-800/40 font-medium py-2 rounded-xl flex items-center justify-center gap-2 text-sm hover:bg-sky-900/50"><i class="fas fa-robot"></i> Prompt NotebookLM</button>
            </div>
        </div>
        <div class="card p-5">
            <div class="flex items-center gap-2 mb-3"><i class="fas fa-filter text-orange-400"></i><h2 class="font-semibold">Filtro</h2></div>
            <select id="filterSelect" class="w-full rounded-xl p-2">
                <option value="all">Todas</option>
                <option value="unanswered">Não respondidas</option>
                <option value="wrong">Só erradas</option>
                <option value="starred">⭐ Marcadas</option>
            </select>
            <button id="applyFilterBtn" class="w-full mt-3 btn-primary py-2 rounded-xl text-sm">Aplicar</button>
        </div>
        <div class="card p-5 text-center">
            <div class="flex justify-between items-center"><div><i class="fas fa-star text-yellow-500"></i> <span id="starredCount">0</span></div><div><i class="fas fa-fire text-orange-500"></i> <span id="streakCount">0</span> streak</div><div><i class="fas fa-trophy text-orange-400"></i> <span id="levelBadge">Iniciante</span></div></div>
            <div class="mt-2 text-xs text-textSecondary">+10 acerto | -5 erro</div>
        </div>
    </div>

    <div class="main-content space-y-6">
        <div class="card p-5">
            <div class="flex items-center gap-3 mb-3"><div class="bg-orange-500/10 p-2 rounded-xl"><i class="fas fa-file-upload text-orange-400 text-lg"></i></div><div><h2 class="font-semibold">Banco de questões</h2><p class="text-xs text-textSecondary">Importe até 20 itens (formato: Questão X: ... Comentário: ... Gabarito: Certo/Errado)</p></div></div>
            <select id="disciplineSelect" class="w-full rounded-xl p-2.5 text-sm mb-3"></select>
            <textarea id="questionsRaw" rows="3" class="w-full rounded-xl p-3 text-sm font-mono" placeholder='Questão 1: "A Declaração Universal foi adotada em 1948."

Comentário: "Adotada pela ONU em 10/12/1948."

Gabarito: Certo'></textarea>
            <div class="flex flex-wrap gap-2 mt-3">
                <button id="previewImportBtn" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-xl text-sm"><i class="fas fa-eye"></i> Visualizar</button>
                <button id="importBtn" class="flex-1 btn-primary py-2 rounded-xl text-sm"><i class="fas fa-cloud-upload-alt"></i> Importar</button>
                <button id="exampleBtn" class="bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-xl text-sm"><i class="fas fa-code-branch"></i> Exemplo</button>
                <button id="importPdfBtn" class="bg-[#2D2D35] hover:bg-[#3A3A44] text-white px-3 py-2 rounded-xl text-sm"><i class="fas fa-file-pdf"></i> PDF</button>
                <input type="file" id="pdfUpload" accept=".pdf" class="hidden">
            </div>
            <div class="flex justify-between text-xs text-textSecondary mt-2"><span>Máx 20</span><span id="questionCounter">0/20</span></div>
        </div>

        <div class="card p-5">
            <div class="flex justify-between items-center mb-3"><div class="flex items-center gap-2"><i class="fas fa-chart-pie text-orange-400 text-lg"></i><h2 class="font-semibold">Desempenho</h2></div><button id="reportBtn" class="text-orange-400 text-xs bg-orange-500/10 px-3 py-1.5 rounded-full"><i class="fas fa-chart-line"></i> Relatório</button></div>
            <div id="dashboardArea" class="min-h-[100px]"></div>
            <div id="insightMsg" class="mt-2 text-sm font-medium"></div>
            <div class="mt-3 pt-2 border-t border-borderLight"><canvas id="disciplineChart" height="120"></canvas></div>
        </div>

        <div id="questionsGridContainer" class="questions-grid"></div>
        <div class="pagination">
            <button id="prevPageBtn" class="page-btn"><i class="fas fa-chevron-left"></i> Anterior</button>
            <span id="pageIndicator" class="text-sm font-medium">Página 1</span>
            <button id="nextPageBtn" class="page-btn">Próxima <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>
</div>
<button id="exitFocusBtn" class="exit-focus-btn"><i class="fas fa-times-circle"></i> Sair do modo foco</button>

<div id="previewModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center p-4"><div class="bg-card rounded-2xl max-w-2xl w-full max-h-[80vh] overflow-auto p-6 border border-borderLight"><h3 class="text-xl font-bold mb-3">Pré-visualização</h3><div id="previewList" class="space-y-2 text-sm"></div><div class="flex justify-end gap-3 mt-4"><button id="cancelPreview" class="px-4 py-2 bg-gray-700 rounded-xl">Cancelar</button><button id="confirmPreview" class="px-4 py-2 bg-orange-600 text-white rounded-xl">Confirmar</button></div></div></div>

<script>
    // ----------------------------- TEMA (data-theme) -----------------------------
    (function() {
        const saved = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", saved);
    })();
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        // Atualizar ícone do botão
        const btn = document.getElementById("themeToggleBtn");
        if(btn) btn.innerHTML = next === "dark" ? '<i class="fas fa-moon"></i> Tema' : '<i class="fas fa-sun"></i> Tema';
    }

    // ----------------------------- ESTRUTURA DE DADOS -----------------------------
    let questions = [];        // array de objetos { id, number, text, comment, answer, discipline, responded, userChoice, showComment, starred? }
    let starredSet = new Set(); // ids
    let points = 0, streak = 0;
    let currentFilter = "all";
    let filteredList = [];
    let currentPage = 0;
    const PAGE_SIZE = 10;
    const MAX_QUESTIONS = 20;
    const DISCIPLINAS = ["Língua Portuguesa","Raciocínio Lógico","Direito Constitucional","Direito Administrativo","Auditoria","Contabilidade"];

    // timer
    let timerSeconds = 0, timerInterval = null, timerRunning = false;

    // DOM
    const disciplineSelect = document.getElementById("disciplineSelect");
    const rawInput = document.getElementById("questionsRaw");
    const importBtn = document.getElementById("importBtn");
    const previewBtn = document.getElementById("previewImportBtn");
    const exampleBtn = document.getElementById("exampleBtn");
    const importPdfBtn = document.getElementById("importPdfBtn");
    const pdfUpload = document.getElementById("pdfUpload");
    const filterSelect = document.getElementById("filterSelect");
    const applyFilterBtn = document.getElementById("applyFilterBtn");
    const prevPageBtn = document.getElementById("prevPageBtn");
    const nextPageBtn = document.getElementById("nextPageBtn");
    const pageIndicator = document.getElementById("pageIndicator");
    const questionsGrid = document.getElementById("questionsGridContainer");
    const dashboardArea = document.getElementById("dashboardArea");
    const disciplineChartCanvas = document.getElementById("disciplineChart");
    const starredCountSpan = document.getElementById("starredCount");
    const streakCountSpan = document.getElementById("streakCount");
    const levelBadge = document.getElementById("levelBadge");
    const questionCounterSpan = document.getElementById("questionCounter");
    const topProgressFill = document.getElementById("topProgressFill");
    const timerDisplay = document.getElementById("timerDisplay");

    DISCIPLINAS.forEach(d => { let opt = document.createElement("option"); opt.value = d; opt.textContent = d; disciplineSelect.appendChild(opt); });

    function showToast(msg) { let toast = document.createElement("div"); toast.className = "toast"; toast.innerText = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2500); }

    // ----- PARSER INTELIGENTE (obrigatório) -----
    function parseQuestoes(texto) {
        const blocos = texto.split(/Questão\s+\d+:/g).filter(Boolean);
        const questoes = [];
        let idCounter = Date.now();
        for(let bloco of blocos) {
            const comentarioMatch = bloco.match(/Comentário:\s*(.*?)(?=Gabarito:|$)/is);
            const gabaritoMatch = bloco.match(/Gabarito:\s*(Certo|Errado)/i);
            let pergunta = bloco
                .replace(/Comentário:.*$/is, "")
                .replace(/Gabarito:.*$/is, "")
                .trim();
            if(pergunta.startsWith('"') && pergunta.endsWith('"')) pergunta = pergunta.slice(1,-1);
            const comentario = comentarioMatch ? comentarioMatch[1].trim() : "Sem comentário adicional.";
            const respostaCorreta = gabaritoMatch ? (gabaritoMatch[1].toUpperCase().startsWith("C") ? "Certo" : "Errado") : null;
            if(pergunta && respostaCorreta) {
                questoes.push({
                    id: idCounter++,
                    number: questoes.length+1,
                    text: pergunta,
                    comment: comentario,
                    answer: respostaCorreta,
                    discipline: disciplineSelect.value,
                    responded: false,
                    userChoice: null,
                    showComment: false,
                    isStarred: false
                });
            }
        }
        return questoes;
    }

    function importQuestions(rawText) {
        let parsed = parseQuestoes(rawText);
        if(parsed.length === 0) { showToast("Nenhuma questão válida encontrada"); return false; }
        if(parsed.length > MAX_QUESTIONS) { showToast(`Limite de ${MAX_QUESTIONS} questões`); return false; }
        questions = parsed;
        starredSet.clear();
        points = 0; streak = 0;
        saveToLocal();
        applyFilter();
        showToast(`${parsed.length} questões importadas`);
        return true;
    }

    function saveToLocal() {
        const toSave = questions.map(q => ({ ...q }));
        localStorage.setItem("auditor_questions_v2", JSON.stringify(toSave));
        localStorage.setItem("auditor_starred", JSON.stringify([...starredSet]));
        localStorage.setItem("auditor_points", points);
        localStorage.setItem("auditor_streak", streak);
        localStorage.setItem("auditor_timer", timerSeconds);
        localStorage.setItem("auditor_timerRunning", timerRunning);
        localStorage.setItem("auditor_filter", currentFilter);
    }

    function loadFromLocal() {
        const savedQ = localStorage.getItem("auditor_questions_v2");
        if(savedQ) {
            questions = JSON.parse(savedQ);
            // garantir que campos novos existam
            questions.forEach(q => { if(q.responded === undefined) q.responded = false; if(q.showComment === undefined) q.showComment = false; if(q.userChoice === undefined) q.userChoice = null; if(q.isStarred === undefined) q.isStarred = false; });
        }
        const star = localStorage.getItem("auditor_starred");
        if(star) starredSet = new Set(JSON.parse(star));
        let pts = localStorage.getItem("auditor_points");
        if(pts) points = parseInt(pts);
        let strk = localStorage.getItem("auditor_streak");
        if(strk) streak = parseInt(strk);
        let sec = localStorage.getItem("auditor_timer");
        if(sec) timerSeconds = parseInt(sec);
        let run = localStorage.getItem("auditor_timerRunning");
        if(run === "true") { timerRunning = true; startTimerInterval(); }
        updateTimerDisplay();
        let filt = localStorage.getItem("auditor_filter");
        if(filt) currentFilter = filt;
        filterSelect.value = currentFilter;
        updatePointsAndStreak();
        applyFilter();
    }

    function updatePointsAndStreak() {
        let totalPoints = 0, currentStreak = 0;
        for(let q of questions) {
            if(q.responded) {
                if(q.userChoice === q.answer) { totalPoints += 10; currentStreak++; }
                else { totalPoints = Math.max(0, totalPoints-5); currentStreak = 0; }
            }
        }
        points = totalPoints; streak = currentStreak;
        let level = points < 100 ? "Iniciante" : (points < 300 ? "Intermediário" : "Avançado");
        levelBadge.innerText = level;
        streakCountSpan.innerText = streak;
        saveToLocal();
    }

    function responderQuestao(id, resposta) {
        const q = questions.find(qq => qq.id === id);
        if(!q || q.responded) return;
        q.responded = true;
        q.userChoice = resposta;
        q.showComment = false; // comentário começa fechado
        updatePointsAndStreak();
        saveToLocal();
        renderAll();
        document.getElementById(`question-card-${id}`)?.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function toggleComentario(id) {
        const q = questions.find(qq => qq.id === id);
        if(q && q.responded) {
            q.showComment = !q.showComment;
            renderAll();
        }
    }

    function toggleStar(id) {
        if(starredSet.has(id)) starredSet.delete(id);
        else starredSet.add(id);
        saveToLocal();
        renderAll();
    }

    function applyFilter() {
        if(!questions.length) { filteredList = []; currentPage = 0; renderAll(); return; }
        let filter = filterSelect.value;
        currentFilter = filter;
        let filtered = [...questions];
        if(filter === "unanswered") filtered = filtered.filter(q => !q.responded);
        else if(filter === "wrong") filtered = filtered.filter(q => q.responded && q.userChoice !== q.answer);
        else if(filter === "starred") filtered = filtered.filter(q => starredSet.has(q.id));
        filteredList = filtered;
        currentPage = 0;
        renderAll();
    }

    function renderDashboard() {
        let total = questions.filter(q => q.responded).length;
        let correct = questions.filter(q => q.responded && q.userChoice === q.answer).length;
        dashboardArea.innerHTML = `<div class="grid grid-cols-2 gap-3"><div class="bg-emerald-950/40 p-3 rounded-xl text-center border border-emerald-800/30"><i class="fas fa-check-circle text-emerald-500 text-xl"></i><div class="text-2xl font-bold">${correct}</div><div class="text-xs">Acertos</div></div><div class="bg-red-950/40 p-3 rounded-xl text-center border border-red-800/30"><i class="fas fa-times-circle text-red-500 text-xl"></i><div class="text-2xl font-bold">${total-correct}</div><div class="text-xs">Erros</div></div></div>`;
        if(window.disChart) window.disChart.destroy();
        let ctx = disciplineChartCanvas.getContext("2d");
        window.disChart = new Chart(ctx, { type:"bar", data:{ labels:["Acertos","Erros"], datasets:[{ label:"", data:[correct, total-correct], backgroundColor: ["#F97316","#EF4444"], borderRadius: 8 }] }, options:{ responsive: true, maintainAspectRatio: true, scales: { y: { grid: { color: "rgba(255,255,255,0.05)" } }, x: { ticks: { color: "var(--text-secondary)" } } } } });
        let insight = "";
        let last5 = questions.filter(q => q.responded).slice(-5);
        let lastCorrect = last5.filter(q => q.userChoice === q.answer).length;
        if(last5.length>=3 && lastCorrect/last5.length>0.6) insight = "🔥 Bom rendimento! Continue assim.";
        else if(last5.length>=3 && lastCorrect/last5.length<0.4) insight = "⚠️ Atenção! Revise os conceitos.";
        document.getElementById("insightMsg").innerHTML = insight ? `<div class="p-2 rounded-lg bg-orange-500/10 text-orange-300">${insight}</div>` : "";
    }

    function renderQuestionsPage() {
        if(!filteredList.length) { questionsGrid.innerHTML = `<div class="card p-8 text-center text-textSecondary"><i class="fas fa-inbox text-4xl mb-2"></i><p>Nenhuma questão para exibir.</p></div>`; return; }
        const start = currentPage * PAGE_SIZE;
        const end = Math.min(start + PAGE_SIZE, filteredList.length);
        const pageQuestions = filteredList.slice(start, end);
        let html = '';
        for(let q of pageQuestions) {
            const isStarred = starredSet.has(q.id);
            const starIcon = isStarred ? "fas fa-star text-yellow-500" : "far fa-star";
            let cardClass = '';
            if(q.responded) cardClass = q.userChoice === q.answer ? 'correta' : 'errada';
            let botoesResposta = '';
            if(!q.responded) {
                botoesResposta = `<div class="flex gap-3 mt-4"><button class="btn-resposta btn-certo" data-id="${q.id}" data-resp="Certo"><i class="fas fa-check-circle"></i> Certo</button><button class="btn-resposta btn-errado" data-id="${q.id}" data-resp="Errado"><i class="fas fa-times-circle"></i> Errado</button></div>`;
            } else {
                const resultado = q.userChoice === q.answer ? "Correto!" : "Errado!";
                const resultClass = q.userChoice === q.answer ? "bg-emerald-900/40 text-emerald-300" : "bg-red-900/40 text-red-300";
                botoesResposta = `<div class="mt-3 p-3 rounded-xl bg-gray-800/30"><div class="flex items-center gap-2"><span class="result-badge ${resultClass}"><i class="fas ${q.userChoice === q.answer ? 'fa-check-circle' : 'fa-times-circle'} mr-1"></i> Gabarito: ${q.userChoice}</span></div><button class="btn-comentario" data-id="${q.id}"><i class="far fa-comment-dots mr-1"></i> ${q.showComment ? 'Esconder Comentário' : 'Mostrar Comentário'}</button>${q.showComment ? `<div class="comentario-content"><strong>Comentário:</strong> ${q.comment}<br><span class="text-xs mt-1 block">Gabarito oficial: ${q.answer}</span></div>` : ''}</div>`;
            }
            html += `<div class="question-card ${cardClass}" id="question-card-${q.id}"><div class="questao-numero"><span class="bg-orange-500/15 text-orange-300 text-xs px-2 py-0.5 rounded-full">Questão ${q.number}</span><span class="text-xs text-textSecondary">${q.discipline}</span><button class="star-btn ml-auto text-lg" data-id="${q.id}"><i class="${starIcon}"></i></button></div><div class="questao-texto">${q.text}</div>${botoesResposta}</div>`;
        }
        questionsGrid.innerHTML = html;
        // Eventos dinâmicos
        document.querySelectorAll('.btn-resposta').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); const resp = btn.dataset.resp; responderQuestao(id, resp); });
        });
        document.querySelectorAll('.btn-comentario').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); toggleComentario(id); });
        });
        document.querySelectorAll('.star-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); toggleStar(id); });
        });
        updatePaginationControls();
        updateCounterAndProgress();
    }

    function updatePaginationControls() { const totalPages = Math.ceil(filteredList.length / PAGE_SIZE); pageIndicator.innerText = `Página ${currentPage+1} de ${totalPages || 1}`; prevPageBtn.disabled = currentPage === 0; nextPageBtn.disabled = currentPage >= totalPages-1; }
    function updateCounterAndProgress() { questionCounterSpan.innerText = `${filteredList.length}/${MAX_QUESTIONS}`; starredCountSpan.innerText = starredSet.size; let answeredCount = questions.filter(q => q.responded).length; let progressPercent = questions.length ? (answeredCount / questions.length) * 100 : 0; topProgressFill.style.width = `${progressPercent}%`; }
    function renderAll() { renderDashboard(); renderQuestionsPage(); saveToLocal(); }
    function nextPage() { if(currentPage < Math.ceil(filteredList.length / PAGE_SIZE)-1) { currentPage++; renderAll(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }
    function prevPage() { if(currentPage > 0) { currentPage--; renderAll(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }
    function resetProgress() { if(questions.length) { questions.forEach(q => { q.responded = false; q.userChoice = null; q.showComment = false; }); starredSet.clear(); points = 0; streak = 0; saveToLocal(); applyFilter(); showToast("Progresso resetado"); } }
    function clearAllData() { if(confirm("Apagar todos os dados?")) { localStorage.clear(); location.reload(); } }
    function exportJSON() { let data = { questions, starred: [...starredSet] }; let a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:"application/json"})); a.download="auditorquest_backup.json"; a.click(); showToast("Backup exportado"); }
    function generateErrorNotebook() { let wrongs = questions.filter(q => q.responded && q.userChoice !== q.answer); if(wrongs.length===0) { showToast("Nenhum erro"); return; } let content = "CADERNO DE ERROS\n\n"; wrongs.forEach(q=>{ content += `Questão ${q.number}: ${q.text}\nGabarito: ${q.answer}\nComentário: ${q.comment}\n\n---\n\n`; }); let a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([content],{type:"text/plain"})); a.download="caderno_erros.txt"; a.click(); showToast("Caderno de erros gerado"); }
    function generateNotebookLMPrompt() { let prompt = `# Prompt para NotebookLM - Estudo CESPE\n\n## Questões:\n`; questions.forEach((q,idx)=>{ prompt += `\n${idx+1}. ${q.text}\n   Gabarito: ${q.answer}\n   Minha resposta: ${q.responded ? q.userChoice : "Não respondida"}\n   Comentário: ${q.comment}\n`; }); let a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([prompt],{type:"text/markdown"})); a.download="prompt_notebooklm.md"; a.click(); showToast("Prompt baixado"); }
    function generateReport() { let total=questions.filter(q=>q.responded).length, correct=questions.filter(q=>q.responded && q.userChoice===q.answer).length; let pct=total?((correct/total)*100).toFixed(1):0; alert(`RELATÓRIO\nAcertos: ${correct}\nErros: ${total-correct}\nAproveitamento: ${pct}%\nStreak: ${streak}\nPontos: ${points}`); }

    // Timer
    function startTimerInterval() { if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(() => { if(timerRunning) { timerSeconds++; updateTimerDisplay(); saveToLocal(); } }, 1000); }
    function updateTimerDisplay() { let h=Math.floor(timerSeconds/3600), m=Math.floor((timerSeconds%3600)/60), s=timerSeconds%60; timerDisplay.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function startTimer() { if(!timerRunning){ timerRunning=true; if(!timerInterval) startTimerInterval(); saveToLocal(); showToast("Cronômetro iniciado"); } }
    function pauseTimer() { if(timerRunning){ timerRunning=false; saveToLocal(); showToast("Pausado"); } }
    function stopTimer() { timerRunning=false; if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } timerSeconds=0; updateTimerDisplay(); saveToLocal(); showToast("Zerado"); }

    // Eventos
    document.getElementById("timerStart").onclick = startTimer;
    document.getElementById("timerPause").onclick = pauseTimer;
    document.getElementById("timerStop").onclick = stopTimer;
    document.getElementById("resetProgressBtn").onclick = resetProgress;
    document.getElementById("clearAllBtn").onclick = clearAllData;
    document.getElementById("exportDataBtn").onclick = exportJSON;
    document.getElementById("focusModeBtn").onclick = () => document.body.classList.toggle("focus-mode");
    document.getElementById("exitFocusBtn").onclick = () => document.body.classList.remove("focus-mode");
    document.getElementById("themeToggleBtn").onclick = toggleTheme;
    prevPageBtn.onclick = prevPage; nextPageBtn.onclick = nextPage;
    applyFilterBtn.onclick = applyFilter;
    importBtn.onclick = () => { if(rawInput.value.trim()) importQuestions(rawInput.value); };
    previewBtn.onclick = () => { let parsed = parseQuestoes(rawInput.value); if(parsed.length) { document.getElementById("previewList").innerHTML = parsed.map(q=>`<div><strong>Q${q.number}:</strong> ${q.text.substring(0,80)}... <span class="text-xs">${q.answer}</span></div>`).join(""); document.getElementById("previewModal").style.display = "flex"; } else showToast("Nada detectado"); };
    document.getElementById("cancelPreview").onclick = () => document.getElementById("previewModal").style.display = "none";
    document.getElementById("confirmPreview").onclick = () => { importQuestions(rawInput.value); document.getElementById("previewModal").style.display = "none"; };
    exampleBtn.onclick = () => { rawInput.value = `Questão 1: "A Declaração Universal dos Direitos Humanos foi adotada em 1948."\nComentário: "Adotada pela ONU em 10/12/1948."\nGabarito: Certo\n\nQuestão 2: "O Brasil foi descoberto em 1500 por Pedro Álvares Cabral."\nComentário: "Fato histórico consolidado."\nGabarito: Certo\n\nQuestão 3: "A auditoria interna é facultativa para empresas de capital aberto."\nComentário: "É obrigatória por lei."\nGabarito: Errado`; importQuestions(rawInput.value); };
    importPdfBtn.onclick = () => pdfUpload.click();
    pdfUpload.onchange = async(e) => { if(e.target.files[0]) { showToast("Extraindo PDF..."); let file = e.target.files[0]; let reader = new FileReader(); reader.onload = async(ev) => { let typedarray = new Uint8Array(ev.target.result); let pdf = await pdfjsLib.getDocument(typedarray).promise; let text=""; for(let i=1;i<=pdf.numPages;i++) { let page=await pdf.getPage(i); let content=await page.getTextContent(); text+=content.items.map(t=>t.str).join(" "); } rawInput.value = text; importQuestions(text); }; reader.readAsArrayBuffer(file); } };
    document.getElementById("userMenuBtn").onclick = () => document.getElementById("userDropdown").classList.toggle("hidden");
    document.addEventListener("click", (e) => { if(!document.getElementById("userMenuBtn").contains(e.target)) document.getElementById("userDropdown").classList.add("hidden"); });
    document.getElementById("reportBtn").onclick = generateReport;
    document.getElementById("downloadErrorsBtn").onclick = generateErrorNotebook;
    document.getElementById("downloadNotebookBtn").onclick = generateNotebookLMPrompt;
    window.addEventListener("keydown", (e) => { if(e.key==="ArrowRight") nextPage(); if(e.key==="ArrowLeft") prevPage(); });

    // Inicialização
    loadFromLocal();
    if(!questions.length) showToast("Bem-vindo! Clique em 'Exemplo' para importar questões.");
</script>
</body>
</html>
